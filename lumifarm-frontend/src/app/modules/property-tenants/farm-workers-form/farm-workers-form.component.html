<!-- Modal Backdrop -->
<div
  *ngIf="isOpen"
  class="fixed inset-0 z-40 bg-black/50 transition-opacity"
></div>

<!-- Modal -->
<div
  *ngIf="isOpen"
  class="fixed inset-0 z-50 flex items-center justify-center p-4"
>
  <div
    class="bg-white dark:bg-slate-800 rounded-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto shadow-lg border border-gray-200 dark:border-slate-700 animate-in fade-in zoom-in-95 duration-200"
  >
    <!-- Header -->
    <div
      class="sticky top-0 z-10 flex items-center justify-between p-6 border-b border-gray-200 dark:border-slate-700 bg-white dark:bg-slate-800"
    >
      <h2 class="text-lg font-semibold text-gray-900 dark:text-white">
        {{ isEditMode ? "Edit Farm Worker" : "Add Farm Worker" }}
      </h2>
      <button
        (click)="closeModal()"
        [disabled]="loading"
        class="text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 transition-colors"
      >
        <i class="fas fa-times text-lg"></i>
      </button>
    </div>

    <!-- Content -->
    <div class="p-6 space-y-4">
      <!-- Loading Tenant Context -->
      <div
        *ngIf="tenantRefreshLoading"
        class="p-4 rounded-lg bg-blue-50 dark:bg-blue-900/20 text-blue-700 dark:text-blue-400 text-sm border border-blue-200 dark:border-blue-800 flex items-center gap-2"
      >
        <i class="fas fa-spinner fa-spin"></i>
        <span>Loading organization...</span>
      </div>

      <!-- Error Message -->
      <div
        *ngIf="error"
        class="p-4 rounded-lg bg-red-50 dark:bg-red-900/20 text-red-700 dark:text-red-400 text-sm border border-red-200 dark:border-red-800"
      >
        <div class="flex items-start gap-3">
          <i class="fas fa-exclamation-circle mt-0.5 flex-shrink-0"></i>
          <div class="flex-1">
            <p>{{ error }}</p>
            <button
              *ngIf="tenantMissing"
              (click)="authService.logout(); closeModal()"
              class="mt-2 inline-block text-sm underline hover:no-underline font-medium"
            >
              Log Out and Log In Again
            </button>
          </div>
        </div>
      </div>

      <!-- Name & Phone -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label
            class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
          >
            Full Name <span class="text-red-500">*</span>
          </label>
          <input
            [(ngModel)]="form.fullName"
            type="text"
            placeholder="e.g., John Doe"
            [disabled]="loading || tenantMissing"
            class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none focus:ring-2 focus:ring-offset-0"
          />
        </div>
        <div>
          <label
            class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
          >
            Phone <span class="text-red-500">*</span>
          </label>
          <input
            [(ngModel)]="form.phone"
            type="tel"
            placeholder="+254712345678"
            [disabled]="loading || tenantMissing"
            class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none focus:ring-2 focus:ring-offset-0"
          />
        </div>
      </div>

      <!-- Email & ID -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label
            class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
            >Email</label
          >
          <input
            [(ngModel)]="form.email"
            type="email"
            placeholder="email@example.com"
            [disabled]="loading || tenantMissing"
            class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none focus:ring-2 focus:ring-offset-0"
          />
        </div>
        <div>
          <label
            class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
            >National ID</label
          >
          <input
            [(ngModel)]="form.nationalId"
            type="text"
            placeholder="ID number"
            [disabled]="loading || tenantMissing"
            class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none focus:ring-2 focus:ring-offset-0"
          />
        </div>
      </div>

      <!-- Role & Specialization -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label
            class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
            >Role</label
          >
          <select
            [(ngModel)]="form.role"
            [disabled]="loading || tenantMissing"
            class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none focus:ring-2 focus:ring-offset-0"
          >
            <option *ngFor="let opt of roleOptions" [value]="opt">
              {{ opt }}
            </option>
          </select>
        </div>
        <div>
          <label
            class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
            >Specialization</label
          >
          <select
            [(ngModel)]="form.specialization"
            [disabled]="loading || tenantMissing"
            class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none focus:ring-2 focus:ring-offset-0"
          >
            <option *ngFor="let opt of specializationOptions" [value]="opt">
              {{ opt }}
            </option>
          </select>
        </div>
      </div>

      <!-- Availability & Monthly Wage -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label
            class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
            >Availability</label
          >
          <select
            [(ngModel)]="form.availability"
            [disabled]="loading || tenantMissing"
            class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none focus:ring-2 focus:ring-offset-0"
          >
            <option *ngFor="let opt of availabilityOptions" [value]="opt">
              {{ opt }}
            </option>
          </select>
        </div>
        <div>
          <label
            class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
            >Monthly Wage</label
          >
          <input
            [(ngModel)]="form.monthlyWage"
            type="number"
            placeholder="0"
            [disabled]="loading || tenantMissing"
            class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none focus:ring-2 focus:ring-offset-0"
          />
        </div>
      </div>

      <!-- Address & Currency -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label
            class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
            >Address</label
          >
          <input
            [(ngModel)]="form.address"
            type="text"
            placeholder="Street address"
            [disabled]="loading || tenantMissing"
            class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none focus:ring-2 focus:ring-offset-0"
          />
        </div>
        <div>
          <label
            class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
            >Currency</label
          >
          <input
            [(ngModel)]="form.currency"
            type="text"
            placeholder="KES"
            [disabled]="loading || tenantMissing"
            class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none focus:ring-2 focus:ring-offset-0"
          />
        </div>
      </div>

      <!-- Skills & Insurance -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label
            class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
            >Skills</label
          >
          <input
            [(ngModel)]="form.skills"
            type="text"
            placeholder="Comma-separated skills"
            [disabled]="loading || tenantMissing"
            class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none focus:ring-2 focus:ring-offset-0"
          />
        </div>
        <div>
          <label
            class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
            >Health Insurance Number</label
          >
          <input
            [(ngModel)]="form.healthInsuranceNumber"
            type="text"
            placeholder="Insurance ID"
            [disabled]="loading || tenantMissing"
            class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none focus:ring-2 focus:ring-offset-0"
          />
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div
      class="sticky bottom-0 z-10 flex justify-end gap-3 p-6 border-t border-gray-200 dark:border-slate-700 bg-white dark:bg-slate-800"
    >
      <button
        (click)="closeModal()"
        [disabled]="loading || tenantMissing || tenantRefreshLoading"
        class="px-4 py-2 rounded-lg border border-gray-300 dark:border-slate-600 text-sm text-gray-700 dark:text-gray-300 font-medium hover:bg-gray-50 dark:hover:bg-slate-700/50 transition-colors disabled:opacity-50"
      >
        Cancel
      </button>
      <button
        (click)="onSubmit()"
        [disabled]="loading || tenantMissing || tenantRefreshLoading"
        class="px-6 py-2 rounded-lg text-white text-sm font-medium transition-opacity disabled:opacity-50 disabled:cursor-not-allowed"
        [style.background-color]="themeService.accent"
      >
        <span *ngIf="!loading">{{ isEditMode ? "Update" : "Add" }} Worker</span>
        <span *ngIf="loading"
          ><i class="fas fa-spinner fa-spin mr-2"></i>Saving...</span
        >
      </button>
    </div>
  </div>
</div>
