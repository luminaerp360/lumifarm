<div
  *ngIf="isOpen"
  class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 dark:bg-opacity-70"
>
  <div
    class="bg-white dark:bg-slate-900 rounded-lg shadow-xl w-full max-w-2xl max-h-[90vh] overflow-hidden flex flex-col"
  >
    <!-- Sticky Header -->
    <div
      class="sticky top-0 bg-white dark:bg-slate-800 border-b border-gray-200 dark:border-slate-700 px-6 py-4 flex justify-between items-center"
    >
      <h2 class="text-xl font-bold text-gray-900 dark:text-white">
        {{ isEditMode ? "Edit Crop Cycle" : "Add New Crop Cycle" }}
      </h2>
      <button
        (click)="closeModal()"
        class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200"
      >
        ✕
      </button>
    </div>

    <!-- Content -->
    <div class="overflow-y-auto flex-1 px-6 py-4">
      <!-- Tenant Loading -->
      <div
        *ngIf="tenantRefreshLoading"
        class="flex items-center justify-center py-8"
      >
        <div
          class="animate-spin rounded-full h-8 w-8 border-b-2"
          [style.border-color]="themeService.accentColor"
        ></div>
      </div>

      <!-- Tenant Error -->
      <div
        *ngIf="tenantMissing && !tenantRefreshLoading"
        class="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg p-4 mb-4"
      >
        <p class="text-red-800 dark:text-red-200 text-sm">{{ error }}</p>
        <button
          (click)="authService.logout()"
          class="mt-2 text-sm text-red-600 dark:text-red-400 hover:underline"
        >
          Logout and login again
        </button>
      </div>

      <!-- Error Message -->
      <div
        *ngIf="error && !tenantMissing"
        class="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg p-4 mb-4"
      >
        <p class="text-red-800 dark:text-red-200 text-sm">{{ error }}</p>
      </div>

      <!-- Form -->
      <form
        *ngIf="!tenantRefreshLoading"
        (ngSubmit)="onSubmit()"
        class="space-y-4"
      >
        <!-- Farm & Plot Selection -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
            >
              Farm
            </label>
            <select
              [(ngModel)]="form.farmId"
              name="farmId"
              class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-slate-800 text-gray-900 dark:text-white"
            >
              <option value="">Select Farm</option>
            </select>
          </div>
          <div>
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
            >
              Plot
            </label>
            <select
              [(ngModel)]="form.plotId"
              name="plotId"
              class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-slate-800 text-gray-900 dark:text-white"
            >
              <option value="">Select Plot</option>
            </select>
          </div>
        </div>

        <!-- Farm Worker Selection -->
        <div>
          <label
            class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
          >
            Farm Worker <span class="text-red-500">*</span>
          </label>
          <select
            [(ngModel)]="form.farmWorkerId"
            name="farmWorkerId"
            class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-slate-800 text-gray-900 dark:text-white"
            required
          >
            <option value="">Select Farm Worker</option>
          </select>
        </div>

        <!-- Crop Type -->
        <div>
          <label
            class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
          >
            Crop Type <span class="text-red-500">*</span>
          </label>
          <input
            [(ngModel)]="form.cropType"
            type="text"
            name="cropType"
            placeholder="e.g., Maize, Beans, Tomato"
            class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-slate-800 text-gray-900 dark:text-white"
            required
          />
        </div>

        <!-- Planting & Harvest Dates -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
            >
              Planting Date <span class="text-red-500">*</span>
            </label>
            <input
              [(ngModel)]="form.plantingDate"
              type="date"
              name="plantingDate"
              class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-slate-800 text-gray-900 dark:text-white"
              required
            />
          </div>
          <div>
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
            >
              Expected Harvest Date
            </label>
            <input
              [(ngModel)]="form.expectedHarvestDate"
              type="date"
              name="expectedHarvestDate"
              class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-slate-800 text-gray-900 dark:text-white"
            />
          </div>
        </div>

        <!-- Seed Info -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
            >
              Seed Supplier
            </label>
            <input
              [(ngModel)]="form.seedSupplier"
              type="text"
              name="seedSupplier"
              placeholder="e.g., ABC Seeds Ltd"
              class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-slate-800 text-gray-900 dark:text-white"
            />
          </div>
          <div>
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
            >
              Seed Variety
            </label>
            <input
              [(ngModel)]="form.seedVariety"
              type="text"
              name="seedVariety"
              placeholder="e.g., Hybrid H625"
              class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-slate-800 text-gray-900 dark:text-white"
            />
          </div>
        </div>

        <!-- Projections -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
            >
              Projected Yield (units)
            </label>
            <input
              [(ngModel)]="form.projectedYield"
              type="number"
              name="projectedYield"
              placeholder="e.g., 500"
              class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-slate-800 text-gray-900 dark:text-white"
            />
          </div>
          <div>
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
            >
              Expected Crop Value
            </label>
            <input
              [(ngModel)]="form.expectedCropValue"
              type="number"
              name="expectedCropValue"
              placeholder="e.g., 50000"
              class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-slate-800 text-gray-900 dark:text-white"
            />
          </div>
        </div>

        <!-- Inputs & Labor -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
            >
              Water Consumption (units)
            </label>
            <input
              [(ngModel)]="form.waterConsumption"
              type="number"
              name="waterConsumption"
              placeholder="0"
              class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-slate-800 text-gray-900 dark:text-white"
            />
          </div>
          <div>
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
            >
              Labor Cost
            </label>
            <input
              [(ngModel)]="form.laborCost"
              type="number"
              name="laborCost"
              placeholder="0"
              class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-slate-800 text-gray-900 dark:text-white"
            />
          </div>
        </div>

        <!-- Harvest Frequency -->
        <div>
          <label
            class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
          >
            Harvest Frequency
          </label>
          <select
            [(ngModel)]="form.harvestFrequency"
            name="harvestFrequency"
            class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-slate-800 text-gray-900 dark:text-white"
          >
            <option *ngFor="let freq of frequencyOptions" [value]="freq">
              {{ freq }}
            </option>
          </select>
        </div>

        <!-- Notes -->
        <div>
          <label
            class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
          >
            Notes
          </label>
          <textarea
            [(ngModel)]="form.terms"
            name="terms"
            rows="3"
            placeholder="Additional notes..."
            class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-slate-800 text-gray-900 dark:text-white"
          ></textarea>
        </div>
      </form>
    </div>

    <!-- Sticky Footer -->
    <div
      class="sticky bottom-0 bg-white dark:bg-slate-800 border-t border-gray-200 dark:border-slate-700 px-6 py-4 flex justify-end gap-3"
    >
      <button
        (click)="closeModal()"
        class="px-4 py-2 text-gray-700 dark:text-gray-300 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-slate-700"
      >
        Cancel
      </button>
      <button
        (click)="onSubmit()"
        [disabled]="loading || tenantMissing || tenantRefreshLoading"
        class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-400 flex items-center gap-2"
      >
        <span
          *ngIf="loading"
          class="animate-spin inline-block h-4 w-4 border-2 border-white border-t-transparent rounded-full"
        ></span>
        {{ isEditMode ? "Update" : "Add" }} Cycle
      </button>
    </div>
  </div>
</div>
