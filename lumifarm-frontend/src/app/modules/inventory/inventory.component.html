<div class="p-6">
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-800 dark:text-gray-100">
      Inventory & Inputs
    </h1>
    <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">
      Manage seeds, fertilizers, pesticides, and other farm inputs
    </p>
  </div>

  <div
    class="bg-white dark:bg-slate-800 rounded-xl border border-gray-200 dark:border-slate-700 p-12 text-center"
  >
    <div
      class="w-16 h-16 rounded-full mx-auto mb-4 flex items-center justify-center"
      [style.background-color]="themeService.accent + '20'"
    >
      <i
        class="fas fa-warehouse text-2xl"
        [style.color]="themeService.accent"
      ></i>
    </div>
    <h2 class="text-lg font-semibold text-gray-700 dark:text-gray-200 mb-2">
      Coming Soon
    </h2>
    <p class="text-gray-500 dark:text-gray-400 max-w-md mx-auto">
      Track farm inventory including seeds, fertilizers, pesticides, animal
      feed, and other supplies. Monitor stock levels, usage, and set reorder
      alerts.
    </p>
    <div class="mt-6 flex flex-wrap justify-center gap-2 text-xs">
      <span
        class="px-3 py-1 rounded-full bg-green-50 text-green-700 dark:bg-green-900/20 dark:text-green-400"
        >Seeds & Seedlings</span
      >
      <span
        class="px-3 py-1 rounded-full bg-blue-50 text-blue-700 dark:bg-blue-900/20 dark:text-blue-400"
        >Fertilizers</span
      >
      <span
        class="px-3 py-1 rounded-full bg-red-50 text-red-700 dark:bg-red-900/20 dark:text-red-400"
        >Pesticides</span
      >
      <span
        class="px-3 py-1 rounded-full bg-orange-50 text-orange-700 dark:bg-orange-900/20 dark:text-orange-400"
        >Stock Alerts</span
      >
    </div>
  </div>
</div>
