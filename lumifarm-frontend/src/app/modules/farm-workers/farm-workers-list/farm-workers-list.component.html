<div>
  <div
    class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6"
  >
    <h1 class="text-2xl font-bold text-gray-800 dark:text-gray-100">
      Farm Workers
    </h1>
    <button
      (click)="openForm()"
      class="inline-flex items-center gap-2 px-4 py-2 rounded-lg text-white text-sm font-medium"
      [style.background-color]="themeService.accent"
    >
      <i class="fas fa-plus"></i> Add Farm Worker
    </button>
  </div>

  <!-- Search -->
  <div class="mb-6">
    <input
      type="text"
      [(ngModel)]="search"
      (keyup.enter)="onSearch()"
      placeholder="Search farm workers..."
      class="w-full sm:w-80 px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 text-sm outline-none"
    />
  </div>

  <div *ngIf="loading" class="flex items-center justify-center py-20">
    <i
      class="fas fa-spinner fa-spin text-2xl"
      [style.color]="themeService.accent"
    ></i>
  </div>

  <div
    *ngIf="!loading"
    class="bg-white dark:bg-slate-800 rounded-xl border border-gray-200 dark:border-slate-700 overflow-hidden"
  >
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr
            class="border-b border-gray-200 dark:border-slate-700 bg-gray-50 dark:bg-slate-700/50"
          >
            <th
              class="text-left px-4 py-3 font-medium text-gray-600 dark:text-gray-300"
            >
              Name
            </th>
            <th
              class="text-left px-4 py-3 font-medium text-gray-600 dark:text-gray-300 hidden sm:table-cell"
            >
              Phone
            </th>
            <th
              class="text-left px-4 py-3 font-medium text-gray-600 dark:text-gray-300 hidden md:table-cell"
            >
              Role
            </th>
            <th
              class="text-left px-4 py-3 font-medium text-gray-600 dark:text-gray-300 hidden lg:table-cell"
            >
              Availability
            </th>
            <th
              class="text-left px-4 py-3 font-medium text-gray-600 dark:text-gray-300"
            >
              Status
            </th>
          </tr>
        </thead>
        <tbody>
          <tr
            *ngFor="let w of workers"
            (click)="viewWorker(w._id)"
            class="border-b border-gray-100 dark:border-slate-700 hover:bg-gray-50 dark:hover:bg-slate-700/30 cursor-pointer transition-colors"
          >
            <td class="px-4 py-3">
              <div class="font-medium text-gray-800 dark:text-gray-100">
                {{ w.fullName }}
              </div>
              <div
                *ngIf="w.email"
                class="text-xs text-gray-500 dark:text-gray-400"
              >
                {{ w.email }}
              </div>
            </td>
            <td
              class="px-4 py-3 text-gray-600 dark:text-gray-300 hidden sm:table-cell"
            >
              {{ w.phone }}
            </td>
            <td
              class="px-4 py-3 text-gray-600 dark:text-gray-300 hidden md:table-cell capitalize"
            >
              {{ w.role }}
            </td>
            <td
              class="px-4 py-3 text-gray-600 dark:text-gray-300 hidden lg:table-cell"
            >
              {{ w.availability | titlecase }}
            </td>
            <td class="px-4 py-3">
              <span
                class="px-2 py-1 rounded-full text-xs font-medium"
                [ngClass]="
                  w.isActive
                    ? 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400'
                    : 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400'
                "
              >
                {{ w.isActive ? "Active" : "Inactive" }}
              </span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <div
      *ngIf="workers.length === 0"
      class="text-center py-12 text-gray-500 dark:text-gray-400"
    >
      <i class="fas fa-users text-3xl mb-3 block"></i>
      <p>No farm workers found</p>
    </div>
    <div
      *ngIf="totalPages > 1"
      class="flex items-center justify-between px-4 py-3 border-t border-gray-200 dark:border-slate-700"
    >
      <span class="text-sm text-gray-500 dark:text-gray-400"
        >{{ total }} total</span
      >
      <div class="flex gap-1">
        <button
          *ngFor="let p of [].constructor(totalPages); let i = index"
          (click)="goToPage(i + 1)"
          class="w-8 h-8 rounded text-sm font-medium"
          [class.text-white]="page === i + 1"
          [style.background-color]="
            page === i + 1 ? themeService.accent : 'transparent'
          "
          [class.text-gray-600]="page !== i + 1"
        >
          {{ i + 1 }}
        </button>
      </div>
    </div>
  </div>

  <!-- Add/Edit Modal -->
  <div
    *ngIf="showForm"
    class="fixed inset-0 z-50 flex items-center justify-center bg-black/50"
  >
    <div
      class="bg-white dark:bg-slate-800 rounded-xl border border-gray-200 dark:border-slate-700 p-6 w-full max-w-lg mx-4 max-h-[90vh] overflow-y-auto"
    >
      <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-100 mb-4">
        {{ editingWorker ? "Edit Farm Worker" : "Add Farm Worker" }}
      </h2>
      <div class="space-y-4">
        <!-- Full Name & Phone -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
              >Full Name <span class="text-red-500">*</span></label
            >
            <input
              type="text"
              [(ngModel)]="form.fullName"
              placeholder="e.g., John Kamau"
              class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none"
            />
          </div>
          <div>
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
              >Phone <span class="text-red-500">*</span></label
            >
            <input
              type="tel"
              [(ngModel)]="form.phone"
              placeholder="0712345678"
              class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none"
            />
          </div>
        </div>
        <!-- Email & National ID -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
              >Email</label
            >
            <input
              type="email"
              [(ngModel)]="form.email"
              placeholder="email@example.com"
              class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none"
            />
          </div>
          <div>
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
              >National ID</label
            >
            <input
              type="text"
              [(ngModel)]="form.nationalId"
              placeholder="ID number"
              class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none"
            />
          </div>
        </div>
        <!-- Role & Availability -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
              >Role</label
            >
            <select
              [(ngModel)]="form.role"
              class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none"
            >
              <option *ngFor="let r of roleOptions" [value]="r">
                {{ r | titlecase }}
              </option>
            </select>
          </div>
          <div>
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
              >Availability</label
            >
            <select
              [(ngModel)]="form.availability"
              class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none"
            >
              <option *ngFor="let a of availabilityOptions" [value]="a">
                {{ a | titlecase }}
              </option>
            </select>
          </div>
        </div>
        <!-- Monthly Wage & Address -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
              >Monthly Wage (KES)</label
            >
            <input
              type="number"
              [(ngModel)]="form.monthlyWage"
              placeholder="0"
              class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none"
            />
          </div>
          <div>
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
              >Address</label
            >
            <input
              type="text"
              [(ngModel)]="form.address"
              placeholder="Location"
              class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none"
            />
          </div>
        </div>
        <!-- Skills -->
        <div>
          <label
            class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
            >Skills</label
          >
          <input
            type="text"
            [(ngModel)]="form.skills"
            placeholder="e.g., Spraying, Ploughing, Harvesting"
            class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none"
          />
        </div>
      </div>
      <div class="flex justify-end gap-3 mt-6">
        <button
          (click)="showForm = false"
          class="px-4 py-2 rounded-lg border border-gray-300 dark:border-slate-600 text-sm text-gray-700 dark:text-gray-300"
        >
          Cancel
        </button>
        <button
          (click)="save()"
          [disabled]="saving"
          class="px-6 py-2 rounded-lg text-white text-sm font-medium"
          [style.background-color]="themeService.accent"
          [class.opacity-50]="saving"
        >
          {{ saving ? "Saving..." : editingWorker ? "Update" : "Create" }}
        </button>
      </div>
    </div>
  </div>
</div>
