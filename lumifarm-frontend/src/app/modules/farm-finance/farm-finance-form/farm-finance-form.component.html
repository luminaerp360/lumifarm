<div
  *ngIf="isOpen"
  class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 dark:bg-opacity-70"
>
  <div
    class="bg-white dark:bg-slate-900 rounded-lg shadow-xl w-full max-w-2xl max-h-[90vh] overflow-hidden flex flex-col"
  >
    <!-- Sticky Header -->
    <div
      class="sticky top-0 bg-white dark:bg-slate-800 border-b border-gray-200 dark:border-slate-700 px-6 py-4 flex justify-between items-center"
    >
      <h2 class="text-xl font-bold text-gray-900 dark:text-white">
        {{ isEditMode ? "Edit Transaction" : "Record Transaction" }}
      </h2>
      <button
        (click)="closeModal()"
        class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200"
      >
        ✕
      </button>
    </div>

    <!-- Content -->
    <div class="overflow-y-auto flex-1 px-6 py-4">
      <!-- Tenant Loading -->
      <div
        *ngIf="tenantRefreshLoading"
        class="flex items-center justify-center py-8"
      >
        <div
          class="animate-spin rounded-full h-8 w-8 border-b-2"
          [style.border-color]="themeService.accent"
        ></div>
      </div>

      <!-- Tenant Error -->
      <div
        *ngIf="tenantMissing && !tenantRefreshLoading"
        class="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg p-4 mb-4"
      >
        <p class="text-red-800 dark:text-red-200 text-sm">{{ error }}</p>
        <button
          (click)="authService.logout()"
          class="mt-2 text-sm text-red-600 dark:text-red-400 hover:underline"
        >
          Logout and login again
        </button>
      </div>

      <!-- Error Message -->
      <div
        *ngIf="error && !tenantMissing"
        class="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg p-4 mb-4"
      >
        <p class="text-red-800 dark:text-red-200 text-sm">{{ error }}</p>
      </div>

      <!-- Form -->
      <form
        *ngIf="!tenantRefreshLoading"
        (ngSubmit)="onSubmit()"
        class="space-y-4"
      >
        <!-- Transaction Type -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
            >
              Transaction Type
            </label>
            <select
              [(ngModel)]="form.transactionType"
              name="transactionType"
              class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-slate-800 text-gray-900 dark:text-white"
            >
              <option *ngFor="let type of transactionTypes" [value]="type">
                {{ type }}
              </option>
            </select>
          </div>
          <div>
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
            >
              Category
            </label>
            <select
              [(ngModel)]="form.category"
              name="category"
              class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-slate-800 text-gray-900 dark:text-white"
            >
              <option *ngFor="let cat of categoryOptions" [value]="cat">
                {{ cat }}
              </option>
            </select>
          </div>
        </div>

        <!-- Farm & Asset Selection -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
            >
              Farm
            </label>
            <select
              [(ngModel)]="form.farmId"
              name="farmId"
              class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-slate-800 text-gray-900 dark:text-white"
            >
              <option value="">Select Farm</option>
            </select>
          </div>
          <div>
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
            >
              Crop Cycle
            </label>
            <select
              [(ngModel)]="form.cropCycleId"
              name="cropCycleId"
              class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-slate-800 text-gray-900 dark:text-white"
            >
              <option value="">Select Crop Cycle</option>
            </select>
          </div>
        </div>

        <!-- Detailed Info -->
        <div>
          <label
            class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
          >
            {{ form.transactionType === "expense" ? "Vendor" : "Buyer" }}
          </label>
          <input
            [(ngModel)]="
              form.transactionType === 'expense' ? form.vendor : form.buyer
            "
            type="text"
            [name]="form.transactionType === 'expense' ? 'vendor' : 'buyer'"
            [placeholder]="
              form.transactionType === 'expense'
                ? 'e.g., ABC Seeds Ltd'
                : 'e.g., Market Trader'
            "
            class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-slate-800 text-gray-900 dark:text-white"
          />
        </div>

        <!-- Description -->
        <div>
          <label
            class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
          >
            Description <span class="text-red-500">*</span>
          </label>
          <textarea
            [(ngModel)]="form.description"
            name="description"
            rows="3"
            placeholder="Detailed description of transaction..."
            class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-slate-800 text-gray-900 dark:text-white"
            required
          ></textarea>
        </div>

        <!-- Amount & Date -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
            >
              Amount <span class="text-red-500">*</span>
            </label>
            <input
              [(ngModel)]="form.amount"
              type="number"
              name="amount"
              placeholder="0"
              step="0.01"
              class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-slate-800 text-gray-900 dark:text-white"
              required
            />
          </div>
          <div>
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
            >
              Transaction Date <span class="text-red-500">*</span>
            </label>
            <input
              [(ngModel)]="form.transactionDate"
              type="date"
              name="transactionDate"
              class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-slate-800 text-gray-900 dark:text-white"
              required
            />
          </div>
        </div>

        <!-- Payment Info -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
            >
              Payment Method
            </label>
            <select
              [(ngModel)]="form.paymentMethod"
              name="paymentMethod"
              class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-slate-800 text-gray-900 dark:text-white"
            >
              <option value="">Select Method</option>
              <option *ngFor="let method of paymentMethods" [value]="method">
                {{ method }}
              </option>
            </select>
          </div>
          <div>
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
            >
              Payment Status
            </label>
            <select
              [(ngModel)]="form.paymentStatus"
              name="paymentStatus"
              class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-slate-800 text-gray-900 dark:text-white"
            >
              <option *ngFor="let status of paymentStatuses" [value]="status">
                {{ status }}
              </option>
            </select>
          </div>
        </div>

        <!-- Income Specific -->
        <div
          *ngIf="form.transactionType === 'income'"
          class="grid grid-cols-2 gap-4"
        >
          <div>
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
            >
              Quantity Sold
            </label>
            <input
              [(ngModel)]="form.quantitySold"
              type="number"
              name="quantitySold"
              placeholder="0"
              class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-slate-800 text-gray-900 dark:text-white"
            />
          </div>
        </div>

        <!-- Reference -->
        <div>
          <label
            class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
          >
            Reference (Receipt #, Invoice #, etc.)
          </label>
          <input
            [(ngModel)]="form.reference"
            type="text"
            name="reference"
            placeholder="e.g., INV-001"
            class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-slate-800 text-gray-900 dark:text-white"
          />
        </div>
      </form>
    </div>

    <!-- Sticky Footer -->
    <div
      class="sticky bottom-0 bg-white dark:bg-slate-800 border-t border-gray-200 dark:border-slate-700 px-6 py-4 flex justify-end gap-3"
    >
      <button
        (click)="closeModal()"
        class="px-4 py-2 text-gray-700 dark:text-gray-300 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-slate-700"
      >
        Cancel
      </button>
      <button
        (click)="onSubmit()"
        [disabled]="loading || tenantMissing || tenantRefreshLoading"
        class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-400 flex items-center gap-2"
      >
        <span
          *ngIf="loading"
          class="animate-spin inline-block h-4 w-4 border-2 border-white border-t-transparent rounded-full"
        ></span>
        {{ isEditMode ? "Update" : "Record" }} Transaction
      </button>
    </div>
  </div>
</div>
